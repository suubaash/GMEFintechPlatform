spring:
  application:
    name: remit-platform
  datasource:
    url: jdbc:postgresql://localhost:5433/remit_platform
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Platform-default config (glossary precedence: Route > Corridor > Tenant > Platform default)
remit:
  otp:
    ttl-seconds: 300
    resend-throttle-seconds: 30
    max-requests-per-window: 5
    rate-window-seconds: 3600
