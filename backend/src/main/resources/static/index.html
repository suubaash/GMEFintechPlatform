<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>GME Remit — Create account</title>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<div class="card">
    <div class="brand">GME<span>Remit</span></div>
    <h1>Create your account</h1>

    <!-- T-1.1.1-19 web registration + OTP form components -->
    <!-- Step 1: identifier -->
    <form id="otpForm" class="step">
        <label>How should we reach you?</label>
        <div class="seg">
            <label class="seg-opt"><input type="radio" name="channel" value="email" checked/> Email</label>
            <label class="seg-opt"><input type="radio" name="channel" value="phone"/> Phone</label>
        </div>
        <input id="identifier" type="text" placeholder="you@example.com" autocomplete="off"/>
        <button type="submit" id="sendBtn">Send code</button>
    </form>

    <!-- Step 2: code + name -->
    <form id="registerForm" class="step hidden">
        <p class="hint">We sent a 6-digit code to <strong id="sentTo"></strong>.</p>
        <input id="fullName" type="text" placeholder="Full name"/>
        <input id="code" type="text" inputmode="numeric" maxlength="6" placeholder="6-digit code"/>
        <button type="submit" id="createBtn">Create account</button>
        <button type="button" id="backBtn" class="link">&larr; Use a different contact</button>
    </form>

    <!-- Success -->
    <div id="done" class="step hidden">
        <div class="check">&#10003;</div>
        <h2>Account created</h2>
        <p class="hint">Status: <strong id="acctStatus"></strong></p>
        <p class="hint">ID: <code id="acctId"></code></p>
    </div>

    <!-- T-1.1.1-20 error states -->
    <div id="error" class="error hidden"></div>

    <p class="hint" style="margin-top:18px;text-align:center;">
        Already have an account? <a href="/send.html">Send money &rarr;</a>
    </p>
</div>
<script src="/js/register.js"></script>
</body>
</html>
